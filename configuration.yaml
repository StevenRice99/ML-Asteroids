behaviors:
  AsteroidsPlayer:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 20480
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 1.0e-2
      beta_schedule: linear
      epsilon: 0.2
      epsilon_schedule: linear
      lambd: 0.95
      num_epoch: 3
      shared_critic: false
    network_settings:
      vis_encode_type: fully_connected
      normalize: false
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.1
        encoding_size: 128
        learning_rate: 3.0e-4
      gail:
        gamma: 0.99
        strength: 0.02
        encoding_size: 128
        learning_rate: 3.0e-4
        use_actions: false
        use_vail: false
        demo_path: Demonstrations/
    behavioral_cloning:
      demo_path: Demonstrations/
      strength: 0.02
      steps: 1000000
      batch_size: 1024
      num_epoch: 3
    max_steps: 1000000
    time_horizon: 128
    summary_freq: 50000
    keep_checkpoints: 10
    checkpoint_interval: 100000
    threaded: false
    init_path: null
checkpoint_settings:
  run_id: asteroids_player
  initialize_from: null
  load_model: false
  resume: false
  force: false
  train_model: false
  inference: false
  results_dir: Results
env_settings:
  env_path: null
  env_args: null
  base_port: 5005
  num_envs: 1
  num_areas: 1
  timeout_wait: 60
  seed: -1
  max_lifetime_restarts: 10
  restarts_rate_limit_n: 1
  restarts_rate_limit_period_s: 60
engine_settings:
  width: 84
  height: 84
  quality_level: 5
  time_scale: 20
  target_frame_rate: -1
  capture_frame_rate: 60
  no_graphics: true
  no_graphics_monitor: false
torch_settings:
  device: null
debug: false
